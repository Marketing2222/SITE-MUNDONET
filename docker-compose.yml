services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
    ports:
      - "3001:3001"
    environment:
      PORT: "3001"
      NODE_ENV: production
      CORS_ORIGIN: "http://localhost:3001,http://localhost:5173,http://127.0.0.1:5173"
      PUBLIC_URL: "http://localhost:3001"
      JWT_SECRET: "local-dev-secret-change-me"
    volumes:
      - mundonet-data:/app/backend/data
      - mundonet-uploads:/app/backend/uploads

volumes:
  mundonet-data:
  mundonet-uploads:
